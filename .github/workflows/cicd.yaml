name: Create Infra and repo
on:
  workflow_dispatch:

jobs:
  load_config:
    runs-on: ubuntu-latest
    outputs:
      tenant_name: ${{ steps.parse.outputs.tenant_name }}
      provision_dev: ${{ steps.parse.outputs.provision_dev }}
      provision_prod: ${{ steps.parse.outputs.provision_prod }}
      provision_dev_action: ${{ steps.parse.outputs.provision_dev_action }}
      provision_prod_action: ${{ steps.parse.outputs.provision_prod_action }}
      dev_yaml: ${{ steps.parse.outputs.dev_yaml }}
      prod_yaml: ${{ steps.parse.outputs.prod_yaml }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Parse infra.yaml
        id: parse
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: |
            echo "tenant_name=$(yq e '.tenant_name' infra.yaml)" >> "$GITHUB_OUTPUT"
            echo "provision_dev=$(yq e '.provision_dev' infra.yaml)" >> "$GITHUB_OUTPUT"
            echo "provision_prod=$(yq e '.provision_prod' infra.yaml)" >> "$GITHUB_OUTPUT"
            echo "provision_dev_action=$(yq e '.provision_dev_action // \"apply\"' infra.yaml)" >> "$GITHUB_OUTPUT"
            echo "provision_prod_action=$(yq e '.provision_prod_action // \"apply\"' infra.yaml)" >> "$GITHUB_OUTPUT"
            {
              echo "dev_yaml<<EOF"
              yq e '.dev' infra.yaml | sed 's/^/  /'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "prod_yaml<<EOF"
              yq e '.prod' infra.yaml | sed 's/^/  /'
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

  provision_dev:
    needs: load_config
    if: needs.load_config.outputs.provision_dev == 'true'
    uses: adarshl02/reusable-workflow-linear-infra/.github/workflows/terraform.yml@linear-infra
    with:
      tenant_name: ${{ needs.load_config.outputs.tenant_name }}
      action: ${{ needs.load_config.outputs.provision_dev_action }}
      environment: "dev"
      config_yaml: |
        dev:
        ${{ needs.load_config.outputs.dev_yaml }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET_DEV }}
      PAT_TOKEN: ${{ secrets.REUSABLE_WORKFLOW_PAT_TOKEN }}

  provision_prod:
    needs: load_config
    if: needs.load_config.outputs.provision_prod == 'true'
    uses: adarshl02/reusable-workflow-linear-infra/.github/workflows/terraform.yml@linear-infra
    with:
      tenant_name: ${{ needs.load_config.outputs.tenant_name }}
      action: ${{ needs.load_config.outputs.provision_prod_action }}
      environment: "prod"
      config_yaml: |
        prod:
        ${{ needs.load_config.outputs.prod_yaml }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      PAT_TOKEN: ${{ secrets.REUSABLE_WORKFLOW_PAT_TOKEN }}
    
  
  create_repo:
      runs-on: ubuntu-latest
      needs: [load_config, provision_dev, provision_prod]
      if: >-
        always() &&
        (needs.provision_dev.result == 'success' || needs.provision_dev.result == 'skipped') &&
        (needs.provision_prod.result == 'success' || needs.provision_prod.result == 'skipped') &&
        (needs.provision_dev.result == 'success' || needs.provision_prod.result == 'success')
      steps:
        - name: Create frontend/backend repos + bootstrap deploy workflow
          uses: actions/github-script@v7
          with:
            github-token: ${{ secrets.REPO_ADMIN_PAT }}
            script: |
              const owner = context.repo.owner;
              const tenant = "${{ needs.load_config.outputs.tenant_name }}";
              const apps = ["frontend", "backend"];

              for (const app of apps) {
                const repo = `${tenant}-${app}`;

                // Create repo if missing
                let exists = true;
                try {
                  await github.rest.repos.get({ owner, repo });
                } catch (e) {
                  if (e.status === 404) exists = false;
                  else throw e;
                }

                if (!exists) {
                  await github.rest.repos.createForAuthenticatedUser({
                    name: repo,
                    private: true,
                    auto_init: true
                  });
                }

                const deployYaml = [
                  "name: App Deploy (Caller)",
                  "on:",
                  "  workflow_dispatch:",
                  "    inputs:",
                  "      environment:",
                  "        description: dev or prod",
                  "        required: true",
                  "        type: choice",
                  "        options: [dev, prod]",
                  "jobs:",
                  "  deploy:",
                  "    uses: adarshl02/central-helm-deploy/.github/workflows/deploy.yaml@main",
                  "    with:",
                  `      tenant_name: ${tenant}`,
                  `      app_name: ${app}`,
                  "      environment: \\${{ inputs.environment }}",
                  "    secrets: inherit"
                ].join("\n");

                const content = Buffer.from(deployYaml).toString("base64");

                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: ".github/workflows/deploy.yaml",
                  message: "chore: bootstrap app deploy caller workflow",
                  content,
                  branch: "main"
                });
              }
             
    
