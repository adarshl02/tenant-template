name: Create Infra and repo
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provision_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1

  provision_prod:
    runs-on: ubuntu-latest
    needs: provision_dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
  
  create_repo:
    runs-on: ubuntu-latest
    needs: provision_prod
    steps:
        - name: Checkout code
          uses: actions/checkout@v3
    
