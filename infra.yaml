tenant_name: test-tenant

provision_dev: true
provision_dev_action: destroy
provision_prod: false
provision_prod_action: apply

dev: 
  tenant_name: test-tenant
  region: us-east-1
  environment: dev
  eks_cluster_name: linear-infra-eks
  resources:
    s3:
      bucket_name: test-tenant-dev-bucket-10604
    sqs:
      queue_name: test-tenant-dev-queue
    sns:
      topic_name: test-tenant-dev-topic
    rds:
      db_name: appdbdev
      db_username: admin
      db_password: ChangeMe123!
      db_instance_class: db.t3.micro
      db_engine: mysql
      db_engine_version: "8.0"
      allocated_storage: 20
    cognito:
      user_pool_name: test-tenant-user-pool
      client_name: test-tenant-client
    iam:
      service_account_name: tenant-sa

prod:
  region: us-east-2
  environment: prod
  eks_cluster_name: linear-infra-eks-prod
  resources:
    s3:
      bucket_name: test-tenant-prod-bucket
    sqs:
      queue_name: test-tenant-prod-queue
    sns:
      topic_name: test-tenant-prod-topic
    rds:
      db_name: appdbprod
      db_username: admin
      db_password: ChangeMe123!
      db_instance_class: db.t3.large
      db_engine: mysql
      db_engine_version: "8.0"
      allocated_storage: 20
    cognito:
      user_pool_name: test-tenant-user-pool
      client_name: test-tenant-client
    iam:
      service_account_name: tenant-sa

