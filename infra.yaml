tenant_name: lh-vansleep

provision_dev: true
provision_dev_action: apply
provision_prod: false
provision_prod_action: apply

dev: 
  tenant_name: lh-vansleep
  region: us-east-1
  environment: dev
  eks_cluster_name: linear-infra-eks
  resources:
    s3:
      bucket_name: lh-vansleep-dev-bucket
    sqs:
      queue_name: lh-vansleep-dev-queue
    sns:
      topic_name: lh-vansleep-dev-topic
    rds:
      db_name: appdb-dev
      db_username: admin
      db_password: ChangeMe123!
      db_instance_class: db.t3.micro
      db_engine: mysql
      db_engine_version: 8.0
      allocated_storage: 20
    cognito:
      user_pool_name: lh-vansleep-user-pool
      client_name: lh-vansleep-client
    iam:
      service_account_name: tenant-sa

prod:
  region: us-east-2
  environment: prod
  eks_cluster_name: linear-infra-eks-prod
  resources:
    s3:
      bucket_name: lh-vansleep-prod-bucket
    sqs:
      queue_name: lh-vansleep-prod-queue
    sns:
      topic_name: lh-vansleep-prod-topic
    rds:
      db_name: appdb-prod
      db_username: admin
      db_password: ChangeMe123!
      db_instance_class: db.t3.large
      db_engine: mysql
      db_engine_version: 8.0
      allocated_storage: 20
    cognito:
      user_pool_name: lh-vansleep-user-pool
      client_name: lh-vansleep-client
    iam:
      service_account_name: tenant-sa

